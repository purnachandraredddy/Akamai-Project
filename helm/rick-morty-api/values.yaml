# Default values for rick-morty-api
# This is a YAML-formatted file.

# Application configuration
app:
  name: rick-morty-api
  version: "1.0.0"
  environment: production

# Image configuration
image:
  repository: rick-morty-api
  tag: "latest"
  pullPolicy: Always
  pullSecrets: []

# Service configuration
service:
  type: ClusterIP
  port: 8000
  metricsPort: 9090
  annotations: {}

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: rick-morty-api.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: rick-morty-api-tls
      hosts:
        - rick-morty-api.example.com

# Deployment configuration
deployment:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

# Resource configuration
resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Autoscaling configuration
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max

# Health check configuration
healthCheck:
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

# Environment variables
env:
  DEBUG: "false"
  API_WORKERS: "4"
  ENABLE_METRICS: "true"
  ENABLE_TRACING: "true"
  CACHE_TTL: "3600"
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW: "60"
  EXTERNAL_API_TIMEOUT: "10"
  EXTERNAL_API_MAX_RETRIES: "3"
  EXTERNAL_API_BACKOFF_DELAY: "1.0"

# Secrets configuration
secrets:
  create: true
  database:
    url: "postgresql+asyncpg://postgres:password@postgres:5432/rickmorty"
  redis:
    url: "redis://redis:6379/0"
  jaeger:
    endpoint: "jaeger-collector:14268"

# Logging configuration
logging:
  enabled: true
  fluentd:
    enabled: true
    image:
      repository: fluent/fluentd
      tag: "v1.16-debian-1"
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"

# Monitoring configuration
monitoring:
  enabled: true
  prometheus:
    enabled: true
    scrape: true
    port: 9090
    path: "/metrics"
  grafana:
    enabled: true
    dashboard:
      enabled: true

# PostgreSQL configuration
postgresql:
  enabled: true
  auth:
    postgresPassword: "password"
    database: "rickmorty"
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"

# Redis configuration
redis:
  enabled: true
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 5Gi
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"

# Node selector and tolerations
nodeSelector: {}
tolerations: []
affinity: {}

# Pod security context
podSecurityContext:
  fsGroup: 2000
  runAsNonRoot: true
  runAsUser: 1000

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Network policy
networkPolicy:
  enabled: false
  ingress: []
  egress: []
