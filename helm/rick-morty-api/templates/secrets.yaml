{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rick-morty-api.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rick-morty-api.labels" . | nindent 4 }}
type: Opaque
data:
  database-url: {{ .Values.secrets.database.url | b64enc | quote }}
  redis-url: {{ .Values.secrets.redis.url | b64enc | quote }}
  jaeger-endpoint: {{ .Values.secrets.jaeger.endpoint | b64enc | quote }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rick-morty-api.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rick-morty-api.labels" . | nindent 4 }}
data:
  app.conf: |
    # Application configuration
    {{- range $key, $value := .Values.env }}
    {{ $key }}={{ $value }}
    {{- end }}
{{- if .Values.logging.fluentd.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rick-morty-api.fullname" . }}-fluentd-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rick-morty-api.labels" . | nindent 4 }}
data:
  fluent.conf: |
    <source>
      @type tail
      path /app/logs/*.log
      pos_file /var/log/fluentd/rick-morty-api.log.pos
      tag rick-morty-api
      format json
      time_key time
      time_format %Y-%m-%dT%H:%M:%S.%L%z
    </source>
    
    <filter rick-morty-api>
      @type record_transformer
      <record>
        service_name rick-morty-api
        environment {{ .Values.app.environment }}
        release {{ .Release.Name }}
      </record>
    </filter>
    
    <match rick-morty-api>
      @type elasticsearch
      host elasticsearch.logging.svc.cluster.local
      port 9200
      index_name rick-morty-api-logs
      type_name _doc
      include_tag_key true
      tag_key @log_name
      flush_interval 1s
      <buffer>
        @type file
        path /var/log/fluentd/buffers/rick-morty-api
        flush_mode interval
        retry_type exponential_backoff
        flush_thread_count 2
        flush_interval 5s
        retry_forever
        retry_max_interval 30
        chunk_limit_size 2M
        queue_limit_length 8
        overflow_action block
      </buffer>
    </match>
    
    <match **>
      @type stdout
    </match>
{{- end }}
