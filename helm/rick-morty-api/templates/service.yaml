apiVersion: v1
kind: Service
metadata:
  name: {{ include "rick-morty-api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rick-morty-api.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  - port: {{ .Values.service.metricsPort }}
    targetPort: metrics
    protocol: TCP
    name: metrics
  selector:
    {{- include "rick-morty-api.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rick-morty-api.fullname" . }}-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rick-morty-api.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - port: {{ .Values.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "rick-morty-api.selectorLabels" . | nindent 4 }}
