apiVersion: v1
kind: ConfigMap
metadata:
  name: apparmor-profile
  namespace: default
  labels:
    app: rick-morty-api
    component: security
data:
  rick-morty-api-apparmor: |
    #include <tunables/global>
    
    profile rick-morty-api flags=(attach_disconnected,mediate_deleted) {
      #include <abstractions/base>
      
      # Allow network access
      network,
      
      # Allow file operations in app directory
      /app/** rw,
      /app/logs/** rw,
      /app/tmp/** rw,
      /app/cache/** rw,
      
      # Allow reading system files
      /etc/passwd r,
      /etc/group r,
      /etc/hosts r,
      /etc/resolv.conf r,
      
      # Allow reading Python libraries
      /opt/venv/** r,
      
      # Deny dangerous operations
      deny capability sys_admin,
      deny capability sys_module,
      deny capability sys_rawio,
      deny capability sys_time,
      deny capability sys_tty_config,
      
      # Allow signal handling
      signal,
      
      # Allow process operations
      ptrace,
      
      # Allow memory operations
      mprotect,
      mmap,
      munmap,
      
      # Allow file operations
      file,
      
      # Allow unix domain sockets
      unix,
    }
