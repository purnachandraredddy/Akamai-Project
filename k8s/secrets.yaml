apiVersion: v1
kind: Secret
metadata:
  name: rick-morty-secrets
  namespace: default
  labels:
    app: rick-morty-api
type: Opaque
data:
  # Base64 encoded values - replace with actual values
  database-url: cG9zdGdyZXNxbCthc3luY3BnOi8vcG9zdGdyZXM6cGFzc3dvcmRAcG9zdGdyZXM6NTQzMi9yaWNrbW9ydHk=
  redis-url: cmVkaXM6Ly9yZWRpczozNjM5LzA=
  # Example: echo -n "your-secret-value" | base64
stringData:
  # Plain text values (will be base64 encoded automatically)
  database-url: "postgresql+asyncpg://postgres:password@postgres:5432/rickmorty"
  redis-url: "redis://redis:6379/0"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rick-morty-config
  namespace: default
  labels:
    app: rick-morty-api
data:
  app.conf: |
    # Application configuration
    DEBUG=false
    API_WORKERS=4
    ENABLE_METRICS=true
    ENABLE_TRACING=true
    CACHE_TTL=3600
    RATE_LIMIT_REQUESTS=100
    RATE_LIMIT_WINDOW=60
