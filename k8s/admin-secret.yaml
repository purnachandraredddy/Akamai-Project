apiVersion: v1
kind: Secret
metadata:
  name: rick-morty-admin-secret
  namespace: default
  labels:
    app: rick-morty-api
type: Opaque
data:
  # Base64 encoded admin API key
  # Generate with: echo -n "your-secure-admin-api-key" | base64
  admin-api-key: eW91ci1zZWN1cmUtYWRtaW4tYXBpLWtleS1oZXJl
---
# Example of how to generate a secure API key
# kubectl create secret generic rick-morty-admin-secret \
#   --from-literal=admin-api-key="$(openssl rand -base64 32)" \
#   --dry-run=client -o yaml
