apiVersion: v1
kind: Service
metadata:
  name: rick-morty-api-service
  namespace: default
  labels:
    app: rick-morty-api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: rick-morty-api
---
apiVersion: v1
kind: Service
metadata:
  name: rick-morty-api-headless
  namespace: default
  labels:
    app: rick-morty-api
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: rick-morty-api
