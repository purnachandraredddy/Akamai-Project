apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rick-morty-api-hpa
  namespace: default
  labels:
    app: rick-morty-api
    component: autoscaler
  annotations:
    description: "Advanced HPA configuration for Rick & Morty API with multiple metrics"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rick-morty-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
  # CPU-based scaling
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  # Memory-based scaling
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  # Custom metrics for request rate
  - type: Pods
    pods:
      metric:
        name: http_requests_per_second
      target:
        type: AverageValue
        averageValue: "100"
  # Custom metrics for response time
  - type: Pods
    pods:
      metric:
        name: http_request_duration_seconds
      target:
        type: AverageValue
        averageValue: "0.5"
  # Custom metrics for error rate
  - type: Pods
    pods:
      metric:
        name: http_requests_total
      target:
        type: AverageValue
        averageValue: "10"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 4
        periodSeconds: 60
      selectPolicy: Max
---
apiVersion: v1
kind: ServiceMonitor
metadata:
  name: rick-morty-api-metrics
  namespace: default
  labels:
    app: rick-morty-api
    component: monitoring
spec:
  selector:
    matchLabels:
      app: rick-morty-api
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: rick-morty-api-custom-metrics
  namespace: default
  labels:
    app: rick-morty-api
    component: custom-metrics
spec:
  selector:
    matchLabels:
      app: rick-morty-api
  endpoints:
  - port: metrics
    path: /metrics
    interval: 15s
    scrapeTimeout: 5s
